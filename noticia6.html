<!DOCTYPE html>

<head>

<meta charset="UTF-8">

<meta property="og:site_name" content="RADAR EUSKADI">

content="https://www.otxoko.com/noticia6.html">

content="summary_large_image">

content="https://erne-tresnak-afi.neocities.org/imagenes/6.jpg">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#e9ecef;
  font-family:Georgia, serif;
  color:#111;
  line-height:1.5;
}

.contenedor{
  width:100%;
  max-width:1100px;
  margin:8px auto;
  background:white;
  min-height:100vh;
  box-shadow:0 0 20px rgba(0,0,0,0.08);
}

.cabecera{
  padding:8px 28px 4px 28px;
  background:white;
}

.cabecera-superior{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:34px;
}

.bloque-texto{
  width:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.logo-texto{
  font-family:Arial, Helvetica, sans-serif;
  font-size:3rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
  line-height:0.95;
}

.sublogo{
  margin-top:2px;
  color:#666;
  font-family:Arial;
  font-size:1rem;
  line-height:1;
}

.logo-imagen{
  width:48%;
  max-height:260px;
  object-fit:contain;
  display:block;
}

.fecha{
  margin-top:-8px;
  margin-bottom:2px;
  color:#888;
  font-family:Arial;
  font-size:0.78rem;
}

.franja-azul{
  width:100%;
  height:5px;
  background:#0057b8;
  margin-top:4px;
  margin-bottom:2px;
}

.noticia{
  padding:14px 28px 28px 28px;
}

.titular{
  font-size:2.25rem;
  line-height:1.08;
  margin-bottom:6px;
  max-width:900px;
}

.autor{
  font-family:Arial, sans-serif;
  font-size:0.82rem;
  color:#777;
  margin-bottom:16px;
  letter-spacing:0.4px;
}

.subtitulo{
  font-size:1.25rem;
  color:#444;
  margin-bottom:22px;
  font-weight:normal;
  max-width:850px;
}

.imagen{
  width:100%;
  border-radius:4px;
  margin-bottom:8px;
  max-height:600px;
  object-fit:cover;
}

.frase{
  font-size:1.15rem;
  font-weight:bold;
  margin-bottom:18px;
  color:#111;
  max-width:900px;
}

.texto{
  font-size:1.12rem;
  color:#222;
  max-width:900px;
}

.footer{
  width:100%;
  background:#0057b8;
  margin-top:30px;
  padding:14px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.footer-texto{
  font-family:Arial, sans-serif;
  font-size:0.78rem;
  color:white;
}

.footer-logo{
  height:42px;
  object-fit:contain;
}

@media(max-width:700px){

  body{
    background:white;
  }

  .contenedor{
    max-width:100%;
    margin:0;
    box-shadow:none;
  }

  .cabecera{
    padding:2px 14px 2px 14px;
  }

  .cabecera-superior{
    gap:10px;
    align-items:center;
  }

  .bloque-texto{
    width:45%;
  }

  .logo-texto{
    font-size:1.7rem;
  }

  .sublogo{
    font-size:0.72rem;
  }

  .logo-imagen{
    width:58%;
    max-height:165px;
  }

  .fecha{
    font-size:0.7rem;
    margin-top:-6px;
  }

  .franja-azul{
    height:4px;
    margin-top:3px;
  }

  .noticia{
    padding:10px 16px 16px 16px;
  }

  .titular{
    font-size:1.8rem;
  }

  .subtitulo{
    font-size:1.08rem;
  }

  .frase{
    font-size:1.02rem;
  }

  .texto{
    font-size:1rem;
  }

  .footer{
    padding:12px 16px;
  }

  .footer-logo{
    height:34px;
  }

  .footer-texto{
    font-size:0.68rem;
  }

}

</style>

</head>

<body>

<div class="contenedor">

<header class="cabecera">

  <div class="cabecera-superior">

    <div class="bloque-texto">

      <div class="logo-texto">
        RADAR EUSKADI
      </div>

      <div class="sublogo">
        Segurtasunaren eta poliziaren aktualitatea
      </div>

    </div>

    <img class="logo-imagen"
         src="imagenes/logo.png"
         alt="RADAR EUSKADI">

  </div>

  <div class="fecha" id="fecha"></div>

  <div class="franja-azul"></div>

</header>

<section class="noticia">

  <h1 class="titular" id="titular"></h1>

  <div class="autor">
    R.E.
  </div>

  <h2 class="subtitulo" id="subtitulo"></h2>

  <img class="imagen"
       id="imagen"
       src=""
       alt="Imagen noticia">

  <div class="frase" id="frase"></div>

  <div class="texto" id="texto"></div>

</section>

<footer class="footer">

  <div class="footer-texto">
    Contacto · info@radareuskadi.com
  </div>

  <img class="footer-logo"
       src="imagenes/logo.png"
       alt="RADAR EUSKADI">

</footer>

</div>

<script>

const hoy = new Date();

document.getElementById('fecha').innerText =
  hoy.toLocaleDateString('eu-ES', {
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  });

fetch('noticias.json')

.then(response => response.json())

.then(data => {

  document.getElementById('titular').innerText =
    data.secundarias[4].titular;

  document.getElementById('subtitulo').innerText =
    data.secundarias[4].texto;

  document.getElementById('imagen').src =
    data.secundarias[4].imagen;

  document.getElementById('frase').innerText =
    data.secundarias[4].texto;

  document.getElementById('texto').innerText =
    data.secundarias[4].texto;

});

</script>

</body>

</html>
