<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RADAR EUSKADI</title>

<meta property="og:type" content="article">
<meta property="og:site_name" content="RADAR EUSKADI">

<meta property="og:title" content="RADAR EUSKADI">

<meta property="og:description"
content="Actualidad de seguridad y policía.">

<meta property="og:image"
content="imagenes/3.jpg">

<meta property="og:image:secure_url"
content="imagenes/3.jpg">

<meta property="og:image:type"
content="image/jpeg">

<meta property="og:image:width"
content="1200">

<meta property="og:image:height"
content="630">

<meta property="og:locale"
content="es_ES">

<meta name="twitter:card"
content="summary_large_image">

<meta name="twitter:title"
content="RADAR EUSKADI">

<meta name="twitter:description"
content="Actualidad de seguridad y policía.">

<meta name="twitter:image"
content="imagenes/3.jpg">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#e9ecef;
  font-family:Georgia, serif;
  color:#111;
  line-height:1.5;
}

.contenedor{
  width:100%;
  max-width:1100px;
  margin:8px auto;
  background:white;
  min-height:100vh;
  box-shadow:0 0 20px rgba(0,0,0,0.08);
}

.cabecera{
  padding:4px 28px 2px 28px;
  background:white;
}

.cabecera-superior{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:25px;
}

.bloque-texto{
  width:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.logo-texto{
  font-family:Arial, Helvetica, sans-serif;
  font-size:3rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
  line-height:0.95;
}

.sublogo{
  margin-top:2px;
  color:#666;
  font-family:Arial;
  font-size:1rem;
  line-height:1;
}

.logo-imagen{
  width:50%;
  max-height:240px;
  object-fit:contain;
  display:block;
}

.fecha{
  margin-top:-8px;
  margin-bottom:2px;
  color:#888;
  font-family:Arial;
  font-size:0.78rem;
}

.franja-azul{
  width:100%;
  height:5px;
  background:#0057b8;
  margin-top:4px;
  margin-bottom:2px;
}

.noticia{
  padding:14px 28px 28px 28px;
}

.titular{
  font-size:2.25rem;
  line-height:1.08;
  margin-bottom:6px;
  max-width:900px;
}

.autor{
  font-family:Arial, sans-serif;
  font-size:0.82rem;
  color:#777;
  margin-bottom:16px;
  letter-spacing:0.4px;
}

.subtitulo{
  font-size:1.25rem;
  color:#444;
  margin-bottom:22px;
  font-weight:normal;
  max-width:850px;
}

.imagen{
  width:100%;
  border-radius:4px;
  margin-bottom:8px;
  max-height:600px;
  object-fit:cover;
}

.pie-foto{
  font-size:0.78rem;
  color:#666;
  margin-bottom:24px;
  font-family:Arial;
}

.frase{
  font-size:1.15rem;
  font-weight:bold;
  margin-bottom:18px;
  color:#111;
  max-width:900px;
}

.texto{
  font-size:1.12rem;
  color:#222;
  max-width:900px;
}

.footer{
  width:100%;
  background:#0057b8;
  margin-top:30px;
  padding:14px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

.footer-texto{
  font-family:Arial, sans-serif;
  font-size:0.78rem;
  color:white;
  letter-spacing:0.3px;
}

.footer-logo{
  height:42px;
  object-fit:contain;
  display:block;
}

@media(max-width:700px){

  body{
    background:white;
  }

  .contenedor{
    max-width:100%;
    margin:0;
    box-shadow:none;
  }

  .cabecera{
    padding:2px 14px 2px 14px;
  }

  .cabecera-superior{
    gap:10px;
    align-items:center;
  }

  .bloque-texto{
    width:45%;
  }

  .logo-texto{
    font-size:1.7rem;
  }

  .sublogo{
    font-size:0.72rem;
  }

  .logo-imagen{
    width:55%;
    max-height:140px;
  }

  .fecha{
    font-size:0.7rem;
    margin-top:-6px;
  }

  .franja-azul{
    height:4px;
    margin-top:3px;
  }

  .noticia{
    padding:10px 16px 16px 16px;
  }

  .titular{
    font-size:1.8rem;
  }

  .subtitulo{
    font-size:1.08rem;
    margin-bottom:18px;
  }

  .frase{
    font-size:1.02rem;
  }

  .texto{
    font-size:1rem;
  }

  .footer{
    padding:12px 16px;
  }

  .footer-logo{
    height:34px;
  }

  .footer-texto{
    font-size:0.68rem;
  }

}

</style>

</head>

<body>

<div class="contenedor">

<header class="cabecera">

  <div class="cabecera-superior">

    <div class="bloque-texto">

      <div class="logo-texto">
        RADAR EUSKADI
      </div>

      <div class="sublogo">
        Segurtasunaren eta poliziaren aktualitatea
      </div>

    </div>

    <img class="logo-imagen"
         src="imagenes/logo.png"
         alt="RADAR EUSKADI">

  </div>

  <div class="fecha" id="fecha"></div>

  <div class="franja-azul"></div>

</header>

<section class="noticia">

  <h1 class="titular"></h1>

  <div class="autor">
    R.E.
  </div>

  <h2 class="subtitulo"></h2>

  <img class="imagen"
       src="imagenes/3.jpg"
       alt="Imagen noticia">

  <div class="pie-foto"></div>

  <div class="frase"></div>

  <div class="texto"></div>

</section>

<footer class="footer">

  <div class="footer-texto">
    Contacto · info@radareuskadi.com
  </div>

  <img class="footer-logo"
       src="imagenes/logo.png"
       alt="RADAR EUSKADI">

</footer>

</div>

<script>

async function cargarNoticia() {

  try {

    const respuesta =
      await fetch('noticias.json?t=' + Date.now());

    const datos =
      await respuesta.json();

    const noticia =
      datos.secundarias.find(n =>
        n.imagen === "imagenes/3.jpg"
      );

    if(!noticia) return;

    document.querySelector('.titular').innerText =
      noticia.titular || '';

    document.querySelector('.subtitulo').innerText =
      noticia.subtitulo || '';

    document.querySelector('.imagen').src =
      'imagenes/3.jpg';

    document.querySelector('.pie-foto').innerText =
      noticia.pieFoto || '';

    document.querySelector('.frase').innerText =
      noticia.frase || '';

    document.querySelector('.texto').innerHTML =
      (noticia.texto || '')
      .replace(/\n/g,'<br><br>');

    document.title =
      noticia.titular || 'RADAR EUSKADI';

    document.querySelector('meta[property="og:title"]')
      .setAttribute('content',
        noticia.titular || '');

    document.querySelector('meta[property="og:description"]')
      .setAttribute('content',
        noticia.subtitulo || '');

    document.querySelector('meta[property="og:image"]')
      .setAttribute('content',
        'imagenes/3.jpg');

    document.querySelector('meta[property="og:image:secure_url"]')
      .setAttribute('content',
        'imagenes/3.jpg');

    document.querySelector('meta[name="twitter:title"]')
      .setAttribute('content',
        noticia.titular || '');

    document.querySelector('meta[name="twitter:description"]')
      .setAttribute('content',
        noticia.subtitulo || '');

    document.querySelector('meta[name="twitter:image"]')
      .setAttribute('content',
        'imagenes/3.jpg');

  }

  catch(error){

    console.error(
      'Error cargando noticias.json',
      error
    );

  }

}

cargarNoticia();

const hoy = new Date();

document.getElementById('fecha').innerText =
  hoy.toLocaleDateString('eu-ES', {
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  });

</script>

</body>

</html>
