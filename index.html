<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#dfe4ea;
  font-family:Arial, Helvetica, sans-serif;
  color:#111;
}

.contenedor{
  width:100%;
  max-width:1280px;
  margin:auto;
  background:white;
  min-height:100vh;
}

/* ÚLTIMA HORA */

.ultima-hora{
  width:100%;
  background:#b30000;
  color:white;
  font-size:0.78rem;
  padding:9px 22px;
  font-weight:bold;
  letter-spacing:0.5px;
  text-transform:uppercase;
}

/* CABECERA */

.cabecera{
  width:100%;
  background:#002b5c;
  color:white;
  border-bottom:5px solid #0057b8;
}

.cabecera-superior{
  width:100%;
  max-width:1280px;
  margin:auto;
  padding:18px 42px 8px 42px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
}

.logo-zona{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  width:100%;
  gap:20px;
}

.bloque-izquierda{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

.logo-texto{
  font-size:3rem;
  font-weight:900;
  letter-spacing:1px;
  line-height:0.9;
}

.sublogo{
  margin-top:6px;
  color:#c8d3df;
  font-size:0.9rem;
}

.bloque-derecha{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.logo-imagen{
  width:220px;
  object-fit:contain;
}

.barra-inferior{
  width:100%;
  max-width:1280px;
  margin:auto;
  padding:0 42px 14px 42px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

.fecha{
  color:#c8d3df;
  font-size:0.78rem;
}

.menu{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}

.menu a{
  color:#c8d3df;
  text-decoration:none;
  font-size:0.72rem;
  font-weight:bold;
  letter-spacing:0.7px;
  transition:0.2s;
  text-transform:uppercase;
}

.menu a:hover{
  color:white;
}

/* HERO */

.hero{
  position:relative;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:650px;
  object-fit:cover;
  display:block;
}

.hero-overlay{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  padding:50px 42px;
  background:linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0));
}

.hero-titular{
  font-family:Georgia, serif;
  font-size:3.4rem;
  color:white;
  line-height:1.02;
  max-width:980px;
  margin-bottom:12px;
}

.hero-subtitulo{
  font-size:1.25rem;
  color:#e5e5e5;
  max-width:850px;
  line-height:1.4;
}

.hero-autor{
  margin-top:18px;
  color:#d2d2d2;
  font-size:0.82rem;
  letter-spacing:0.4px;
}

.link-titular{
  text-decoration:none;
  color:inherit;
}

/* DESARROLLO PRINCIPAL */

.desarrollo-principal{
  padding:34px 42px 10px 42px;
  background:white;
}

.desarrollo-contenido{
  max-width:920px;
}

.frase-destacada{
  font-family:Georgia, serif;
  font-size:1.45rem;
  line-height:1.45;
  margin-bottom:24px;
  color:#111;
  font-weight:bold;
}

.texto-principal{
  font-family:Georgia, serif;
  font-size:1.16rem;
  line-height:1.9;
  color:#222;
}

/* SECUNDARIAS */

.secundarias{
  padding:30px;
}

.titulo-seccion{
  font-size:1.4rem;
  margin-bottom:22px;
  border-left:6px solid #0057b8;
  padding-left:12px;
}

.secundarias-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:24px;
}

.noticia-secundaria{
  background:white;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,0.08);
  transition:0.25s;
}

.noticia-secundaria:hover{
  transform:translateY(-4px);
}

.noticia-secundaria img{
  width:100%;
  height:220px;
  object-fit:cover;
  display:block;
}

.noticia-contenido{
  padding:18px;
}

.noticia-secundaria h3{
  font-family:Georgia, serif;
  font-size:1.35rem;
  line-height:1.15;
  margin-bottom:8px;
}

.autor-sec{
  font-size:0.74rem;
  color:#777;
  margin-bottom:12px;
  letter-spacing:0.4px;
}

.noticia-secundaria p{
  color:#555;
  line-height:1.5;
  font-size:0.98rem;
}

/* FOOTER */

.footer{
  background:#002b5c;
  color:white;
  margin-top:30px;
  padding:28px;
}

.footer-superior{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.footer-texto{
  font-size:0.82rem;
  line-height:1.7;
}

.footer-logo{
  height:55px;
  object-fit:contain;
}

/* RESPONSIVE */

@media(max-width:900px){

  .secundarias-grid{
    grid-template-columns:1fr 1fr;
  }

}

@media(max-width:700px){

  body{
    background:white;
  }

  .cabecera-superior{
    padding:16px;
  }

  .logo-zona{
    flex-direction:column;
    gap:18px;
  }

  .bloque-derecha{
    width:100%;
    align-items:flex-start;
  }

  .logo-imagen{
    width:150px;
  }

  .logo-texto{
    font-size:1.9rem;
  }

  .sublogo{
    font-size:0.72rem;
  }

  .barra-inferior{
    padding:0 16px 14px 16px;
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  .menu{
    gap:12px;
  }

  .menu a{
    font-size:0.62rem;
  }

  .hero img{
    height:420px;
  }

  .hero-overlay{
    padding:22px 18px;
  }

  .hero-titular{
    font-size:2rem;
  }

  .hero-subtitulo{
    font-size:1rem;
  }

  .desarrollo-principal{
    padding:24px 18px 0 18px;
  }

  .frase-destacada{
    font-size:1.12rem;
    line-height:1.6;
  }

  .texto-principal{
    font-size:1rem;
    line-height:1.8;
  }

  .secundarias{
    padding:16px;
  }

  .secundarias-grid{
    grid-template-columns:1fr;
    gap:18px;
  }

  .noticia-secundaria img{
    height:190px;
  }

  .noticia-secundaria h3{
    font-size:1.18rem;
  }

  .footer{
    padding:18px 16px;
  }

  .footer-logo{
    height:42px;
  }

}

</style>

</head>

<body>

<script>

const hoy = new Date();

document.getElementById('fecha').innerText =
  hoy.toLocaleDateString('eu-ES', {
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  });

fetch('noticias.json')

.then(response => response.json())

.then(data => {

  document.getElementById('titular').innerText =
    data.principal.titular;

  document.getElementById('subtitulo').innerText =
    data.principal.subtitulo;

  document.getElementById('imagenPrincipal').src =
    data.principal.imagen;

  document.getElementById('frasePrincipal').innerText =
    data.principal.frase;

  document.getElementById('textoPrincipal').innerText =
    data.principal.texto;

  for(let i = 0; i < 6; i++){

    document.getElementById('imgSec' + (i+1)).src =
      data.secundarias[i].imagen;

    document.getElementById('titSec' + (i+1)).innerText =
      data.secundarias[i].titular;

    document.getElementById('txtSec' + (i+1)).innerText =
      data.secundarias[i].texto;

  }

});

</script>
